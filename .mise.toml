[tools]
shellcheck = "0.11.0"
shfmt = "3.13.1"

[tasks.format]
description = "Format all shell scripts with shfmt"
run = "shfmt -w -i 2 src/ scripts/ tests/ examples/"

[tasks.format-check]
description = "Check shell scripts are formatted — exits non-zero and shows diff if any differ"
run = "shfmt -d -i 2 src/ scripts/ tests/ examples/"

[tasks.lint]
description = "Lint all shell scripts with shellcheck"
run = "shellcheck $(find src scripts examples -name '*.sh' | sort)"

[tasks.test]
description = "Run ShellSpec tests under the default shell (bash, per .shellspec)"
run = "shellspec tests/"

[tasks.test-bash]
description = "Run ShellSpec tests under bash"
run = "shellspec --shell bash tests/"

[tasks.test-zsh]
description = "Run ShellSpec tests under zsh"
run = "shellspec --shell zsh tests/"

[tasks.test-all]
description = "Run ShellSpec tests under bash and zsh"
depends = ["test-bash", "test-zsh"]

[tasks.docs]
description = "Generate markdown docs from shdoc annotations in src/lib/"
run = "mkdir -p docs && for f in src/lib/*.sh; do gawk -f scripts/shdoc < \"$f\" > \"docs/$(basename \"$f\" .sh).md\"; done"

[tasks.build]
description = "Generate the dist/shkit tree, tarball, and loose release assets"
run = "bash scripts/build.sh"

[tasks.install]
description = "Install the shkit distribution to ~/.rn-forge (versioned, with current symlink)"
depends = ["build"]
run = "bash dist/shkit/install.sh"

[tasks.clean]
description = "Remove generated dist/ artifacts"
run = "rm -rf dist/"

[tasks.coverage]
description = "Run tests under bash with kcov and generate an HTML+lcov coverage report in coverage/"
run = "shellspec --shell bash --kcov --kcov-options '--include-path=src/lib,src/source.sh,dist/install.sh,dist/shkit/rnfshk.sh,dist/shkit/commands' tests/"

[tasks.verify]
description = "Full pipeline (CI): format-check, lint, coverage, build, docs. Needs kcov — use verify-local on macOS."
depends = ["format-check", "lint", "coverage", "build", "docs"]

[tasks.verify-local]
description = "Full pipeline for local dev: format-check, lint, test-all (bash+zsh), build, docs. No coverage — works on macOS."
depends = ["format-check", "lint", "test-all", "build", "docs"]
