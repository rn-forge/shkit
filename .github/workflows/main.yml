name: CICD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    # Pinned to 22.04: kcov was dropped from Ubuntu's repos in 24.04
    # (noble) onward, and is only apt-installable through 22.04 (jammy).
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install mise tools (shellcheck, shfmt)
        uses: jdx/mise-action@v2

      - name: Install ShellSpec
        run: |
          curl -fsSL https://raw.githubusercontent.com/shellspec/shellspec/master/install.sh | sh -s -- --yes

      - name: Install kcov
        run: |
          sudo apt-get update
          sudo apt-get install -y kcov

      - name: Verify
        run: mise run verify

      - name: Check generated docs are committed
        run: |
          if ! git diff --exit-code -- docs/; then
            printf '%s\n' 'Generated docs are stale. Run `mise run verify-local` locally and commit the updated docs/ files.' >&2
            exit 1
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            dist/rn-forge-shkit.sh
            dist/rn-forge-shkit.sh.map
            dist/rn-forge-shkit.tar.gz
            dist/rn-forge-shkit.tar.gz.sha256
            dist/source.sh
            dist/install.sh
          retention-days: 7

  verify-zsh:
    # Optional: disable without editing this file by setting the repo
    # variable RUN_ZSH_VERIFY to "false" (Settings → Actions → Variables,
    # or `gh variable set RUN_ZSH_VERIFY --body false`). Runs by default.
    if: vars.RUN_ZSH_VERIFY != 'false'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Install ShellSpec
        run: |
          curl -fsSL https://raw.githubusercontent.com/shellspec/shellspec/master/install.sh | sh -s -- --yes

      - name: Run zsh tests
        run: mise run test-zsh

  publish:
    # verify-zsh is optional (see its `if:` above) — a skip must not block
    # publish, but an actual zsh test failure must.
    if: |
      always() &&
      github.event_name != 'pull_request' &&
      needs.verify.result == 'success' &&
      (needs.verify-zsh.result == 'success' || needs.verify-zsh.result == 'skipped')
    needs: [verify, verify-zsh]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: read_version
        run: |
          version="$(cat VERSION)"
          if ! printf '%s' "$version" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            printf 'error: VERSION is not valid semver: %s\n' "$version" >&2
            exit 1
          fi
          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: dist/

      - name: Create and push tag
        id: tag
        run: |
          tag="v${{ steps.read_version.outputs.version }}"
          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null; then
            printf '%s\n' "Tag $tag already exists, skipping release."
            printf 'tag_pushed=false\n' >> "$GITHUB_OUTPUT"
          else
            git tag -a "$tag" -m "Release $tag"
            git push origin "$tag"
            printf 'tag_pushed=true\n' >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        if: steps.tag.outputs.tag_pushed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.read_version.outputs.version }}
          generate_release_notes: true
          files: |
            dist/rn-forge-shkit.sh
            dist/rn-forge-shkit.sh.map
            dist/rn-forge-shkit.tar.gz
            dist/rn-forge-shkit.tar.gz.sha256
            dist/source.sh
            dist/install.sh
